<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Instagram Carousel" description="Quiet-luxury 1080×1440 myth-carousel slide — forest panel, sage chip, ghost numeral, bone quote-box" -->
<helmet>
<script src="./ds-base.js"></script>
<style>
  body { margin: 0; background: #11150f; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
</style>
</helmet>
<div style="position: relative; width: 1080px; height: 1440px; overflow: hidden; background: #2f3d2e; color: #f1ecdd; font-family: 'Evolventa', system-ui, sans-serif; transform: scale(0.5); transform-origin: center;">

  <!-- ghost numeral (may bleed past safe zone) -->
  <div style="position: absolute; right: -80px; bottom: -200px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500; font-size: 1100px; line-height: 0.78; letter-spacing: -0.06em; opacity: 0.09; pointer-events: none; user-select: none;">{{ mythNumPad }}</div>

  <!-- arc decoration -->
  <div style="position: absolute; width: 1400px; height: 1400px; left: -520px; top: -480px; border: 1.5px solid currentColor; border-radius: 999px; opacity: 0.12; pointer-events: none;"></div>

  <!-- safe-zone content area: top 130 / sides 108 / bottom 220 -->
  <div style="position: absolute; inset: 130px 108px 220px 108px; display: flex; flex-direction: column;">
    <!-- §5: section chip only -->
    <div>
      <span style="display: inline-flex; align-items: center; padding: 14px 26px; background: #87987a; color: #f1ecdd; border-radius: 14px; font-size: 20px; letter-spacing: 0.28em; text-transform: uppercase;">міф · {{ mythNumPad }}</span>
    </div>

    <!-- title block -->
    <div style="margin-top: 72px; max-width: 940px;">
      <div style="font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500; font-size: 38px; opacity: 0.75; margin-bottom: 18px;">міф номер<span style="font-family: 'Calmius Sans','Evolventa',sans-serif; font-weight: 700; font-size: 38px; margin-left: 16px;">{{ mythNumPad }}</span></div>
      <h2 style="font-family: 'Calmius Sans','Evolventa',sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: -0.005em; font-size: 88px; line-height: 0.98; margin: 0;">{{ title }}</h2>
    </div>

    <!-- body -->
    <p style="margin-top: 52px; max-width: 940px; font-size: 34px; line-height: 1.35; opacity: 0.94;">{{ body }}</p>

    <!-- quote box (§3: 22px plate) -->
    <div style="margin-top: auto; max-width: 900px;">
      <div style="position: relative; background: #e9e3d2; color: #1a1f18; border-radius: 22px; padding: 40px 44px 40px 56px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500; font-size: 36px; line-height: 1.3; box-shadow: 0 30px 60px -30px rgba(0,0,0,0.25);">
        <span style="position: absolute; left: 0; top: 16px; bottom: 16px; width: 3px; background: #5e7558; border-radius: 2px;"></span>
        {{ highlight }}
      </div>
    </div>
  </div>

  <!-- §4 footer: @handle · hairline · NN/NN · hairline · spark (108px from bottom) -->
  <div style="position: absolute; left: 108px; right: 108px; bottom: 108px; display: flex; align-items: center; gap: 20px;">
    <span style="font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 28px; opacity: 0.85;">@ksenia.rusnak</span>
    <span style="flex: 1 1 auto; height: 1px; background: currentColor; opacity: 0.32;"></span>
    <span style="font-size: 22px; letter-spacing: 0.18em; padding: 10px 22px; border: 1px solid currentColor; border-radius: 999px; opacity: 0.85; font-variant-numeric: tabular-nums;">{{ indexPad }}/{{ totalPad }}</span>
    <span style="flex: 0 0 28px; height: 1px; background: currentColor; opacity: 0.32;"></span>
    <svg width="24" height="24" viewBox="0 0 32 32" style="flex: 0 0 auto; opacity: 0.85;" aria-hidden="true"><path d="M16 0 C17 11 21 15 32 16 C21 17 17 21 16 32 C15 21 11 17 0 16 C11 15 15 11 16 0 Z" fill="currentColor"></path></svg>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 540, &quot;height&quot;: 720}, &quot;mythNumber&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 4, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 1, &quot;max&quot;: 99}, &quot;title&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;«Маркетинг — це творчість»&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;body&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Креатив без аналітики — це витрата бюджету наосліп. Маркетинг — це математика й прогнозована інфраструктура.&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;highlight&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Немає чітких показників вартості ліда та LTV — бізнесом керує випадок, а не ти.&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;index&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 5, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 1, &quot;max&quot;: 99}, &quot;total&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 11, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 1, &quot;max&quot;: 99}}">
class Component extends DCLogic {
  renderVals() {
    const pad = (n) => String(n).padStart(2, "0");
    const mythNumber = this.props.mythNumber ?? 4;
    return {
      mythNumPad: pad(mythNumber),
      title: this.props.title ?? "«Маркетинг — це творчість»",
      body: this.props.body ?? "Креатив без аналітики — це витрата бюджету наосліп. Маркетинг — це математика й прогнозована інфраструктура.",
      highlight: this.props.highlight ?? "Немає чітких показників вартості ліда та LTV — бізнесом керує випадок, а не ти.",
      indexPad: pad(this.props.index ?? mythNumber + 1),
      totalPad: pad(this.props.total ?? 11),
    };
  }
}
</script>
</body>
</html>
