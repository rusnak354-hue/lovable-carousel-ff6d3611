<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--forest); color: var(--cream); }
  .wrap { padding: 26px 30px; }
  .meta { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.55; margin-bottom: 14px; }
  .spec { font-family: var(--font-display); font-weight: 700; text-transform: uppercase; line-height: 0.95; letter-spacing: -0.005em; }
</style>
</head>
<body>
<div class="wrap">
  <div class="meta">Calmius Sans · 700 · −0.005em · lh 0.95</div>
  <div class="spec" style="font-size:58px">10 душних<br>міфів</div>
</div>
</body>
</html>
