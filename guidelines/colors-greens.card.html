<!-- @dsCard group="Colors" viewport="700x150" name="Forest greens" subtitle="Primary brand greens, dark → light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--milk); }
  .row { display: flex; height: 150px; }
  .sw { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 14px; box-sizing: border-box; }
  .name { font-size: 12px; letter-spacing: 0.04em; }
  .hex { font-size: 11px; opacity: 0.7; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .light { color: var(--cream); }
  .dark { color: var(--ink); }
</style>
</head>
<body>
<div class="row">
  <div class="sw light" style="background:var(--forest-deep)"><span class="name">forest-deep</span><span class="hex">#1F2A1E</span></div>
  <div class="sw light" style="background:var(--forest)"><span class="name">forest</span><span class="hex">#2F3D2E</span></div>
  <div class="sw light" style="background:var(--sage)"><span class="name">sage</span><span class="hex">#5E7558</span></div>
  <div class="sw light" style="background:var(--sage-mid)"><span class="name">sage-mid</span><span class="hex">#87987A</span></div>
  <div class="sw dark" style="background:var(--olive)"><span class="name">olive</span><span class="hex">#A3B193</span></div>
  <div class="sw dark" style="background:var(--olive-light)"><span class="name">olive-light</span><span class="hex">#C4CDB4</span></div>
</div>
</body>
</html>
