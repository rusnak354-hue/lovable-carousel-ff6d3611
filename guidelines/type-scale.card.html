<!-- @dsCard group="Type" viewport="700x150" name="Type scale" subtitle="slide canvas px — eyebrow → body → quote → title → hero" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--cream); color:var(--ink); font-family:var(--font-body); padding:20px 32px; box-sizing:border-box; height:150px; display:flex; align-items:center; gap:34px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .glyph { font-family:var(--font-display); font-weight:700; color:var(--forest); line-height:1; }
  .px { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; opacity:0.55; }
  .nm { font-size:11px; opacity:0.75; }
</style></head>
<body>
  <div class="item"><span class="glyph" style="font-size:24px">Aa</span><span class="nm">eyebrow</span><span class="px">28</span></div>
  <div class="item"><span class="glyph" style="font-size:30px">Aa</span><span class="nm">body</span><span class="px">34</span></div>
  <div class="item"><span class="glyph" style="font-size:34px">Aa</span><span class="nm">quote</span><span class="px">36</span></div>
  <div class="item"><span class="glyph" style="font-size:56px">Aa</span><span class="nm">title</span><span class="px">88</span></div>
  <div class="item"><span class="glyph" style="font-size:64px">Aa</span><span class="nm">hero</span><span class="px">96</span></div>
</body></html>
