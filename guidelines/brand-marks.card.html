<div class="wrap">

    <div class="lab">Section chip · top-left</div>

    <div class="lab">Footer · every slide except cover</div>

      <span class="footer-handle">@ksenia.rusnak</span>
      <span class="footer-rule"></span>
      <span class="footer-counter">02/06</span>

  </div>
</div>
