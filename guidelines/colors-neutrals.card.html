<!-- @dsCard group="Colors" viewport="700x150" name="Warm neutrals" subtitle="Bone / cream / milk / ink — warm, never cool gray" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--milk); }
  .row { display: flex; height: 150px; }
  .sw { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 14px; box-sizing: border-box; border-right: 1px solid var(--hairline-light); }
  .name { font-size: 12px; letter-spacing: 0.04em; }
  .hex { font-size: 11px; opacity: 0.7; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .dark { color: var(--ink); }
  .light { color: var(--cream); }
</style>
</head>
<body>
<div class="row">
  <div class="sw dark" style="background:var(--bone)"><span class="name">bone</span><span class="hex">#E9E3D2</span></div>
  <div class="sw dark" style="background:var(--cream)"><span class="name">cream</span><span class="hex">#F1ECDD</span></div>
  <div class="sw dark" style="background:var(--milk)"><span class="name">milk · page</span><span class="hex">#F6F2E7</span></div>
  <div class="sw light" style="background:var(--ink)"><span class="name">ink · text</span><span class="hex">#1A1F18</span></div>
  <div class="sw light" style="background:var(--destructive)"><span class="name">brick · alert</span><span class="hex">#8C3A2E</span></div>
</div>
</body>
</html>
