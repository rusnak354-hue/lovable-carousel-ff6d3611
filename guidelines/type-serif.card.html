<!-- @dsCard group="Type" viewport="700x180" name="Serif accent — Cormorant Garamond" subtitle="Italic, the quiet-luxury softness" -->
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--cream); color: var(--ink); }
  .wrap { padding: 24px 30px; }
  .meta { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.5; margin-bottom: 10px; }
  .spec { font-family: var(--font-serif); font-style: italic; font-weight: 500; line-height: 1.05; letter-spacing: -0.01em; }
  .num { color: var(--sage); }
</style>
</head>
<body>
<div class="wrap">
  <div class="meta">Cormorant Garamond · italic 500</div>
  <div class="spec" style="font-size:66px"><span class="num">01</span> &mdash; масштабуй <em>систему</em></div>
</div>
</body>
</html>
