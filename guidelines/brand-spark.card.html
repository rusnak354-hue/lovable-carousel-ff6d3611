<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--cream); color: var(--ink); }
  .wrap { padding: 24px 30px; display: flex; align-items: center; gap: 34px; }
  .spark { color: var(--forest); }
  .spark.sage { color: var(--sage); }
  .spark.olive { color: var(--olive); }
  .meta { font-family: var(--font-serif); font-style: italic; font-size: 26px; color: var(--sage); }
  .lab { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.5; margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <img class="spark" src="../assets/spark.svg" width="56" height="56" alt="spark" />
  <img class="spark sage" src="../assets/spark.svg" width="38" height="38" alt="spark" />
  <img class="spark olive" src="../assets/spark.svg" width="26" height="26" alt="spark" />
  <div>
    <div class="meta">a quiet flourish</div>
    <div class="lab">assets/spark.svg · currentColor</div>
  </div>
</div>
</body>
</html>
