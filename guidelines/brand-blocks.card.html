<!DOCTYPE html>
<html lang="uk"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--sage); font-family:var(--font-body); padding:24px 28px; box-sizing:border-box; height:200px; display:flex; align-items:center; gap:24px; }
  .qb { flex:1.3; transform:scale(0.62); transform-origin:left center; }
  .np { flex:1; transform:scale(0.66); transform-origin:left center; }
</style></head>
<body>
  <div class="qb"><div class="quote-box">Масштаб починається, коли ти закриваєш ноутбук, а система генерує гроші.</div></div>
  <div class="np"><div class="numbered-pill"><span class="numbered-pill__num">2</span><span class="numbered-pill__text">Підніми конверсію на 1% на кожному етапі воронки.</span></div></div>
</body></html>
