<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); }
  .panel { position: relative; min-height: 230px; box-sizing: border-box; padding: 28px 32px; display: flex; flex-direction: column; gap: 18px; }
  .chip-row { display: flex; }
  .title { font-family: var(--font-display); font-weight: 700; text-transform: uppercase; font-size: 30px; letter-spacing: -0.005em; line-height: 1; }
  .plate { font-family: var(--font-serif); font-style: italic; font-weight: 500; font-size: 22px; line-height: 1.3; max-width: 560px; }
</style>
</head>
<body>
<div class="panel slide-bg-light-grad">
  <div class="chip-row"><span class="sage-chip">міф · 02</span></div>
  <div class="title">світло + зелене сяйво</div>
  <div class="grad-plate plate">Highlight на світлому слайді — єдине місце, де використовується градієнтна заливка.</div>
</div>
</body>
</html>
