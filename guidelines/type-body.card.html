<!-- @dsCard group="Type" viewport="700x200" name="Body & labels — Evolventa" subtitle="Humanist sans, body + tracked labels" -->
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--milk); color: var(--ink); }
  .wrap { padding: 24px 30px; display: flex; flex-direction: column; gap: 16px; }
  .meta { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.5; }
  .body { font-size: 18px; line-height: 1.4; max-width: 560px; }
  .body strong { font-weight: 700; }
  .body em { font-family: var(--font-serif); font-style: italic; font-size: 1.1em; }
  .labels { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .eyebrow { font-size: 13px; letter-spacing: 0.04em; }
  .bracket { font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.8; }
  .caps { font-size: 13px; letter-spacing: 0.32em; text-transform: uppercase; opacity: 0.6; }
</style>
</head>
<body>
<div class="wrap">
  <div class="meta">Evolventa · 400 / 700</div>
  <div class="body">Маркетинг — це <strong>математика</strong> й прогнозована інфраструктура, а не <em>творчість</em> наосліп.</div>
  <div class="labels">
    <span class="eyebrow">eyebrow · 0.04em</span>
    <span class="bracket">[ bracket · 0.22em ]</span>
    <span class="caps">k · rusnak · 0.32em</span>
  </div>
</div>
</body>
</html>
